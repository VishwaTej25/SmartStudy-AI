name: Selenium Web Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'web/**'
      - 'tests/selenium/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'web/**'
      - 'tests/selenium/**'
  workflow_dispatch:

jobs:
  selenium-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build, Serve, and Test Web App (Selenium)
        run: |
          # Build the web app
          cd web
          npm install
          npm run build

          # Serve the app on all interfaces in background
          npx serve -s dist -l 5173 --listen tcp://0.0.0.0:5173 &
          SERVER_PID=$!

          # Wait for the server to become reachable
          echo "Waiting for web app to be reachable..."
          for i in {1..10}; do
            if curl -s http://localhost:5173 > /dev/null; then
              echo "Web app is up!"
              break
            else
              echo "Attempt $i: not ready yet..."
              sleep 5
            fi
          done

          # Install Selenium test dependencies and run tests
          cd ../tests/selenium
          npm install
          node run_tests.js || true

          # Clean up the web server process
          kill $SERVER_PID

      - name: Publish Selenium Test Report Summary
        run: |
          if [ -f "tests/selenium/reports/selenium_test_report.md" ]; then
            cat tests/selenium/reports/selenium_test_report.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Selenium Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-test-report
          path: tests/selenium/reports/
          retention-days: 30
