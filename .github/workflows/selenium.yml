name: Selenium Web Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'web/**'
      - 'tests/selenium/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'web/**'
      - 'tests/selenium/**'
  workflow_dispatch:

jobs:
  selenium-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Web Dependencies
        working-directory: web
        run: npm ci

      - name: Build Web App
        working-directory: web
        run: npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium pytest pytest-html webdriver-manager

      - name: Install Chrome Browser
        uses: browser-actions/setup-chrome@v1

      - name: Start Web App (Preview)
        working-directory: web
        run: |
          npm install -g serve
          serve -s dist -l 4173 &
          sleep 5

      - name: Run Selenium Tests
        run: |
          if [ -d "tests/selenium" ] && [ "$(ls -A tests/selenium/*.py 2>/dev/null)" ]; then
            python -m pytest tests/selenium/ -v --html=tests/selenium/reports/selenium_report.html --self-contained-html || true
          else
            echo "No Selenium tests found - skipping test run"
          fi

      - name: Upload Selenium Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-test-report
          path: tests/selenium/reports/
          retention-days: 30
