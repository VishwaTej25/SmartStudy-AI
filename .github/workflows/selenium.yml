name: Selenium Web Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'web/**'
      - 'tests/selenium/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'web/**'
      - 'tests/selenium/**'
  workflow_dispatch:

jobs:
  selenium-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Web Dependencies
        working-directory: web
        run: npm install

      - name: Build Web App
        working-directory: web
        run: npm run build

      - name: Install Chrome Browser
        uses: browser-actions/setup-chrome@v1

      - name: Start Web App (Preview)
        working-directory: web
        run: |
          npm install -g serve
          serve -s dist -l 5173 &
          sleep 5

      - name: Install Selenium Test Dependencies
        working-directory: tests/selenium
        run: npm install

      - name: Run Selenium Tests
        working-directory: tests/selenium
        run: node run_tests.js || true

      - name: Publish Selenium Test Report Summary
        run: |
          if [ -f "tests/selenium/reports/selenium_test_report.md" ]; then
            cat tests/selenium/reports/selenium_test_report.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Selenium Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-test-report
          path: tests/selenium/reports/
          retention-days: 30
