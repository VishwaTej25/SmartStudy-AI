name: Android App Build & Test

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'build.gradle*'
      - 'settings.gradle*'
      - 'gradle/**'
      - 'tests/appium/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'build.gradle*'
      - 'settings.gradle*'
      - 'gradle/**'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew test

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: smartstudy-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Unit Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: app/build/reports/tests/
          retention-days: 30

  appium-report:
    runs-on: ubuntu-latest
    needs: build-android

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl

      - name: Generate Appium Test Report
        run: |
          if [ -f "tests/appium/generate_md_report.py" ]; then
            python tests/appium/generate_md_report.py tests/appium/reports/appium_test_report.md || true
          else
            echo "No Appium report generator found - skipping"
          fi

      - name: Publish Appium Test Summary
        run: |
          if [ -f "tests/appium/reports/appium_test_report.md" ]; then
            cat tests/appium/reports/appium_test_report.md >> $GITHUB_STEP_SUMMARY
          fi
