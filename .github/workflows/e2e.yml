name: Appium E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl

      - name: Run E2E Test Suite Report Generator
        run: |
          python tests/appium/generate_md_report.py tests/appium/reports/appium_test_report.md

      - name: Publish Appium Test Report Summary
        run: |
          cat tests/appium/reports/appium_test_report.md >> $GITHUB_STEP_SUMMARY

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Selenium Web Test Dependencies
        run: |
          cd tests/selenium
          npm install

      - name: Run Selenium Web E2E Test Suite
        run: |
          cd tests/selenium
          node run_tests.js

      - name: Publish Selenium Test Report Summary
        run: |
          cat tests/selenium/reports/selenium_test_report.md >> $GITHUB_STEP_SUMMARY

